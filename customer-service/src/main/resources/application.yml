spring:
  application:
    name: customer-service
  datasource:
    url:
    username:
    password:
  cache:
    type: redis
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 10
      acks: all
      properties:
        enable.idempotence: true
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 3000

logging:
  level:
    root: INFO
    com.example.infrastructure.messaging.OutboxProcessor: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: prometheus,health,beans
  metrics:
    export:
      prometheus:
        enabled: true

kafka:
  topics:
    customer: customer_monitoring